# TIPA V2.0 — P0 scaffold compose: MDP only (backend + frontend + postgres + Caddy edge).
# Runs the v0.1.5 MDP app byte-identical to V1.x, but with V2-isolated names/volumes/port so it
# COEXISTS with the running V1 `mdp2` stack on tipa-vm. Flink + Grafana are NOT added yet (P1/P2).
#
#   cd ops && docker compose -f docker-compose.v2.yml --env-file .env up -d --build
#
# Coexistence (nothing here collides with the live V1 stack or the shared VPS services):
#   - project name `mdpv2`  -> containers `mdpv2-*`, network `mdpv2_default`,
#     volumes `mdpv2_postgres_data` / `mdpv2_caddy_data` / `mdpv2_caddy_config`
#     (distinct from V1's `mdp2_*` / `mdp_*`).
#   - host port MDP_V2_PORT (default 8457) -> Caddy :8456  (V1 mdp2 keeps host :8456).
#   - postgres is NOT published to the host (reached only inside `mdpv2_default`).
#
# ora2pg is intentionally omitted in P0: it is the Oracle->Postgres migration path that Flink
# replaces in V2 (see docs/TIPA_V2.0_Plan.md, decision H1). The MDP backend starts and runs fine
# without it — the migration dashboard degrades gracefully when Oracle is unreachable (config.py).
name: mdpv2

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CONNECTION_SECRET_KEY: ${CONNECTION_SECRET_KEY}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Background loops default OFF in P0 (no Oracle/ingestion wired yet; Flink replaces ora2pg).
      STREAMING_ENABLED: ${STREAMING_ENABLED:-false}
      STREAMING_INTERVAL: ${STREAMING_INTERVAL:-60}
      ORA2PG_SOURCE_COUNT_ENABLED: ${ORA2PG_SOURCE_COUNT_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  reverse-proxy:
    image: caddy:2
    ports:
      - "${MDP_V2_PORT:-8457}:8456"
    volumes:
      - ./Caddyfile.v2:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
