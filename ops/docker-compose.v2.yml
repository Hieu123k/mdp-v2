# TIPA V2.0 compose: MDP (backend + frontend + postgres + Caddy edge) + Grafana reporting.
# Runs the v0.1.5 MDP app byte-identical to V1.x, plus a DEDICATED Grafana container (P1) that
# reads MDP's Postgres for reporting. V2-isolated names/volumes/ports so it COEXISTS with the
# running V1 `mdp2` stack and the shared VPS services on tipa-vm.
#
#   cd ops && docker compose -f docker-compose.v2.yml --env-file .env up -d --build
#
# Coexistence (nothing here collides with the live V1 stack or the shared VPS services):
#   - project name `mdpv2`  -> containers `mdpv2-*`, network `mdpv2_default`,
#     volumes `mdpv2_postgres_data` / `mdpv2_caddy_data` / `mdpv2_caddy_config` /
#     `mdpv2_grafana_data` (distinct from V1's `mdp2_*` / `mdp_*`).
#   - host ports: MDP_V2_PORT (default 8457) -> Caddy :8456; GRAFANA_PORT (default 3001) -> :3000.
#     (V1 mdp2 keeps host :8456; this Grafana is V2-only and unrelated to any shared Grafana.)
#   - postgres is NOT published to the host (reached only inside `mdpv2_default`); Grafana reads it
#     over the internal network as a least-privilege read-only role `grafana_ro`.
#
# ora2pg / Flink are intentionally absent: admin decided V2 = MDP as-is + Grafana reporting (no CDC).
# The MDP backend starts and runs fine without ora2pg (graceful degradation in config.py).
name: mdpv2

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CONNECTION_SECRET_KEY: ${CONNECTION_SECRET_KEY}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Background loops default OFF in P0 (no Oracle/ingestion wired yet; Flink replaces ora2pg).
      STREAMING_ENABLED: ${STREAMING_ENABLED:-false}
      STREAMING_INTERVAL: ${STREAMING_INTERVAL:-60}
      ORA2PG_SOURCE_COUNT_ENABLED: ${ORA2PG_SOURCE_COUNT_ENABLED:-false}
    volumes:
      # prompt 10: shared ora2pg scripts dir. The backend WRITES the generated perl scripts (probe_cols.pl,
      # discover_keys.pl, source_*.pl) here at runtime; an ora2pg container mounts the same named volume at
      # /config to run them. Without this mount /opt/ora2pg is missing and probe / Verify / streaming fail
      # with "No such file /opt/ora2pg/probe_cols.pl". DEV has no ora2pg container yet, but the dir must
      # exist for consistency once Oracle is wired.
      - ora2pg_config:/opt/ora2pg
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  reverse-proxy:
    image: caddy:2
    ports:
      - "${MDP_V2_PORT:-8457}:8456"
    volumes:
      - ./Caddyfile.v2:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped

  # --- P1: dedicated Grafana for MDP reporting (reads Postgres via the internal network) ---
  grafana:
    image: grafana/grafana:11.6.0
    container_name: mdpv2-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3001}
      # P2/B: Infinity datasource plugin — lets Grafana read MDP OUTBOUND (data model output) over
      # HTTP instead of querying tables directly. NOTE: grafana-cli does not parse the `id@version`
      # form (it 404s), so we install by id; this resolved to v3.8.0 (recorded in the report) and is
      # then pinned in the grafana_data volume. To hard-pin from scratch, run inside the container:
      #   grafana cli --pluginsDir /var/lib/grafana/plugins plugins install yesoreyeram-infinity-datasource 3.8.0
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      # Read-only Postgres role used by the P1 Postgres datasource (interpolated into
      # provisioning/datasources/postgres.yml). Never the MDP app user.
      GRAFANA_DB_USER: ${GRAFANA_DB_USER:-grafana_ro}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}
      # P2/B: outbound-scoped MDP API key for the Infinity datasource (provisioning/datasources/
      # infinity.yml interpolates it into the X-API-Key header). From ops/.env; never literal.
      GRAFANA_MDP_API_KEY: ${GRAFANA_MDP_API_KEY}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  grafana_data:
  ora2pg_config:
